<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    /* [MISMO ESTILO QUE ANTES - SE MANTIENE] */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg-page: #f0f4f8; --surface-primary: #ffffff; --surface-secondary: #f1f5f9; --surface-tertiary: #e2e8f0; --border-light: #cbd5e1; --border-medium: #94a3b8; --text-primary: #0f172a; --text-secondary: #334155; --text-muted: #475569; --accent-success: #15803d; --accent-success-bg: #dcfce7; --accent-error: #b91c1c; --accent-error-bg: #fee2e2; --accent-primary: #1e40af; --accent-primary-bg: #e0e7ff; --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1); --radius-lg: 1rem; --radius-md: 0.75rem; --radius-sm: 0.5rem; }
    @media (prefers-color-scheme: dark) { :root { --bg-page: #0a0c10; --surface-primary: #111827; --surface-secondary: #1f2937; --surface-tertiary: #374151; --border-light: #4b5563; --border-medium: #6b7280; --text-primary: #f3f4f6; --text-secondary: #d1d5db; --text-muted: #9ca3af; --accent-success: #4ade80; --accent-success-bg: #14532d; --accent-error: #f87171; --accent-error-bg: #7f1d1d; --accent-primary: #60a5fa; --accent-primary-bg: #1e3a8a; } }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg-page); color: var(--text-primary); line-height: 1.5; padding: 1.5rem 1rem; min-height: 100vh; }
    .app-container { max-width: 900px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent-primary), #3b82f6, #8b5cf6); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .header p { color: var(--text-muted); margin-top: 0.25rem; }
    .lang-toggle { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
    .lang-btn { background: var(--surface-secondary); border: 1px solid var(--border-light); padding: 0.4rem 1.2rem; border-radius: 40px; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
    .lang-btn.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface-secondary); border-radius: var(--radius-md); padding: 0.7rem; text-align: center; border: 1px solid var(--border-light); }
    .stat-number { font-size: 1.8rem; font-weight: 700; }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
    .stat-card.correct .stat-number { color: var(--accent-success); }
    .stat-card.wrong .stat-number { color: var(--accent-error); }
    .stat-card.score .stat-number { color: var(--accent-primary); }
    .progress-wrapper { background: var(--surface-tertiary); border-radius: 100px; height: 6px; margin-bottom: 1.25rem; overflow: hidden; }
    .progress-fill { background: var(--accent-success); height: 100%; width: 0%; transition: width 0.3s ease; }
    .cat-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--surface-secondary); padding: 0.25rem 1rem; border-radius: 40px; font-size: 0.75rem; margin-bottom: 1rem; border: 1px solid var(--border-light); }
    .question-card { background: var(--surface-primary); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; box-shadow: var(--shadow-sm); }
    .question-num { font-size: 0.75rem; color: var(--accent-primary); font-weight: 600; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.1rem; font-weight: 500; }
    .question-code { font-family: 'JetBrains Mono', monospace; background: var(--surface-secondary); border-left: 3px solid var(--accent-primary); padding: 0.75rem; margin-top: 0.75rem; font-size: 0.85rem; border-radius: var(--radius-sm); white-space: pre-wrap; }
    .options-grid { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 1.25rem; }
    .option-btn { text-align: left; padding: 0.9rem 1rem; background: var(--surface-primary); border: 1px solid var(--border-medium); border-radius: var(--radius-md); font-size: 0.95rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 0.6rem; color: var(--text-primary); }
    .option-btn:hover:not(:disabled) { background: var(--surface-secondary); border-color: var(--accent-primary); transform: translateX(4px); }
    .option-btn.correct { background: var(--accent-success-bg); border-color: var(--accent-success); color: var(--accent-success); }
    .option-btn.wrong { background: var(--accent-error-bg); border-color: var(--accent-error); color: var(--accent-error); }
    .opt-letter { font-weight: 700; min-width: 28px; }
    .feedback-panel { padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1.25rem; border-left: 4px solid; }
    .feedback-panel.correct { background: var(--accent-success-bg); border-left-color: var(--accent-success); }
    .feedback-panel.wrong { background: var(--accent-error-bg); border-left-color: var(--accent-error); }
    .feedback-title { font-weight: 700; margin-bottom: 0.25rem; }
    .action-buttons { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 60px; font-weight: 500; border: 1px solid var(--border-medium); background: var(--surface-primary); cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
    .btn-primary:hover { filter: brightness(1.05); transform: scale(0.98); }
    .mode-selector { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .mode-btn { flex: 1; background: var(--surface-secondary); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 0.8rem 0.2rem; text-align: center; cursor: pointer; transition: all 0.2s; font-weight: 500; }
    .mode-btn.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
    .mode-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
    .cat-picker { display: flex; flex-wrap: wrap; gap: 0.6rem; margin: 1rem 0; }
    .cat-opt-btn { background: var(--surface-secondary); border: 1px solid var(--border-light); border-radius: 60px; padding: 0.45rem 1rem; font-size: 0.8rem; cursor: pointer; }
    .cat-opt-btn.correct { background: var(--accent-primary); color: white; }
    .results-card { text-align: center; padding: 1.8rem; background: var(--surface-primary); border-radius: var(--radius-lg); }
    .score-ring { width: 130px; height: 130px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 1rem auto; background: var(--surface-secondary); }
    .score-inner { background: var(--surface-primary); width: 105px; height: 105px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .cat-results-list { display: flex; flex-direction: column; gap: 0.6rem; margin: 1rem 0; text-align: left; }
    .cat-row { display: flex; justify-content: space-between; background: var(--surface-secondary); padding: 0.6rem 1rem; border-radius: var(--radius-md); }
    .hidden { display: none !important; }
    footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; color: var(--text-muted); }
    @media (max-width: 560px) { .stat-number { font-size: 1.4rem; } .question-text { font-size: 1rem; } }
  </style>

</head>
<body>
<div class="app-container" id="app">
  <div class="header">
    <h1>🧠 Simulador LPI Linux Essentials COMPLETO</h1>
    <p>Certificación 010-160 | ~100 preguntas | Modo experto</p>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('es')">🇪🇸 Español</button>
      <button class="lang-btn" onclick="setLang('en')">🇬🇧 English</button>
    </div>
  </div>

  <div id="mode-screen">
    <div class="mode-selector">
      <div class="mode-btn active" id="mode-all" onclick="setMode('all')"><span class="mode-icon">📋</span><span id="lbl-all">Examen completo</span></div>
      <div class="mode-btn" id="mode-cat" onclick="setMode('cat')"><span class="mode-icon">🎯</span><span id="lbl-cat">Por categoría</span></div>
      <div class="mode-btn" id="mode-wrong" onclick="setMode('wrong')"><span class="mode-icon">🔁</span><span id="lbl-wrong">Solo falladas</span></div>
    </div>
    <div id="cat-picker" class="hidden cat-picker"></div>
    <div style="text-align:center; margin-top: 1rem;">
      <button class="btn btn-primary" onclick="startExam()" id="start-btn">▶ Iniciar examen</button>
    </div>
  </div>

  <div id="exam-screen" class="hidden">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number" id="s-total">0</div><div class="stat-label" id="lbl-total">Total</div></div>
      <div class="stat-card correct"><div class="stat-number" id="s-correct">0</div><div class="stat-label" id="lbl-correct">Correctas</div></div>
      <div class="stat-card wrong"><div class="stat-number" id="s-wrong">0</div><div class="stat-label" id="lbl-wrong2">Falladas</div></div>
      <div class="stat-card score"><div class="stat-number" id="s-score">0%</div><div class="stat-label" id="lbl-score">Score</div></div>
    </div>
    <div class="progress-wrapper"><div class="progress-fill" id="progress"></div></div>
    <div class="cat-badge"><span>📂</span><span id="cat-label"></span></div>
    <div class="question-card">
      <div class="question-num" id="q-num"></div>
      <div class="question-text" id="q-text"></div>
      <div class="question-code hidden" id="q-code"></div>
    </div>
    <div class="options-grid" id="options-container"></div>
    <div class="feedback-panel hidden" id="feedback"></div>
    <div class="action-buttons">
      <button class="btn" onclick="endExam()" id="btn-end">⏹ Terminar</button>
      <button class="btn btn-primary hidden" onclick="nextQuestion()" id="btn-next">Siguiente →</button>
    </div>
  </div>
  <div id="results-screen" class="hidden"></div>
  <footer>🎯 Basado en LPI 010-160 | +100 preguntas originales, corregidas y trampa</footer>
</div>

<script>
// ==============================================================
// BANCO DE PREGUNTAS COMPLETO (ORIGINALES + CORREGIDAS + TRAMPA)
// ==============================================================
const QUESTIONS = [
  // ============================================================
  // PARTE 1: PREGUNTAS ORIGINALES (del simulador base)
  // ============================================================
  // Hardware (cat:0)
  {cat:0, q:{es:'¿Qué archivo en Linux contiene información sobre la CPU?',en:'What file contains CPU info?'}, opts:{es:['/proc/cpuinfo','/sys/cpu','/etc/cpu','/var/cpuinfo'],en:['/proc/cpuinfo','/sys/cpu','/etc/cpu','/var/cpuinfo']}, ans:0, exp:{es:'/proc/cpuinfo es un archivo virtual con detalles del procesador.',en:'/proc/cpuinfo is a virtual file with CPU details.'}},
  {cat:0, q:{es:'¿Qué comando muestra información sobre la memoria RAM?',en:'What command shows RAM info?'}, opts:{es:['meminfo','free','ram -h','vmstat'],en:['meminfo','free','ram -h','vmstat']}, ans:1, exp:{es:'free muestra memoria libre y usada.',en:'free shows free and used memory.'}},
  {cat:0, q:{es:'¿Qué archivo virtual lista dispositivos PCI?',en:'Which virtual file lists PCI devices?'}, opts:{es:['/proc/devices','/proc/pci','/proc/bus/pci','/sys/bus/pci/devices'],en:['/proc/devices','/proc/pci','/proc/bus/pci','/sys/bus/pci/devices']}, ans:3, exp:{es:'/sys/bus/pci/devices muestra dispositivos PCI.',en:'/sys/bus/pci/devices shows PCI devices.'}},
  {cat:0, q:{es:'¿Qué comando lista dispositivos USB?',en:'What command lists USB devices?'}, opts:{es:['lsdev','lsusb','usb-list','listusb'],en:['lsdev','lsusb','usb-list','listusb']}, ans:1, exp:{es:'lsusb lista dispositivos USB conectados.',en:'lsusb lists connected USB devices.'}},
  {cat:0, q:{es:'Primer disco IDE válido',en:'First valid IDE disk'}, opts:{es:['/dev/hd1','/dev/sda','/dev/hda','/dev/ide'],en:['/dev/hd1','/dev/sda','/dev/hda','/dev/ide']}, ans:2, exp:{es:'/dev/hda es el primer disco IDE maestro.',en:'/dev/hda is first IDE master disk.'}},
  {cat:0, q:{es:'¿Función del BIOS/UEFI?',en:'BIOS/UEFI function?'}, opts:{es:['Gestión de archivos','Inicializar hardware y cargar bootloader','Administrar red','Gestionar permisos'],en:['FS management','Init hardware and load bootloader','Network management','Permissions']}, ans:1, exp:{es:'El BIOS inicializa hardware y carga el bootloader.',en:'BIOS initializes hardware and loads bootloader.'}},
  {cat:0, q:{es:'¿Qué comando muestra hardware detallado?',en:'Detailed hardware info command?'}, opts:{es:['hwinfo','lshw','sysinfo','hardware'],en:['hwinfo','lshw','sysinfo','hardware']}, ans:1, exp:{es:'lshw lista hardware completo.',en:'lshw lists full hardware.'}},

  // Command Line (cat:1)
  {cat:1, q:{es:'¿Qué significa ~ en bash?',en:'What does ~ mean in bash?'}, opts:{es:['Directorio actual','Directorio home','Directorio raíz','Directorio anterior'],en:['Current dir','Home dir','Root dir','Previous dir']}, ans:1, exp:{es:'~ es atajo al directorio home del usuario.',en:'~ is shortcut to user home directory.'}},
  {cat:1, q:{es:'¿Qué comando muestra el directorio actual?',en:'What command shows current directory?'}, opts:{es:['cwd','dir','pwd','ls -d'],en:['cwd','dir','pwd','ls -d']}, ans:2, exp:{es:'pwd = print working directory.',en:'pwd = print working directory.'}},
  {cat:1, q:{es:'¿Qué hace "ls -la"?',en:'What does "ls -la" do?'}, opts:{es:['Lista en orden inverso','Lista todos los archivos incluyendo ocultos en formato largo','Lista solo enlaces','Lista con permisos extendidos'],en:['Lists reverse','Lists all including hidden in long format','Lists only links','Extended permissions']}, ans:1, exp:{es:'-l = formato largo, -a = muestra archivos ocultos.',en:'-l = long format, -a = shows hidden files.'}},
  {cat:1, q:{es:'Comodín "?" en glob significa:',en:'Wildcard "?" means:'}, opts:{es:['Cualquier cadena','Un solo carácter','Ninguno','Lista'],en:['Any string','Single character','None','List']}, ans:1, exp:{es:'? coincide con exactamente un carácter.',en:'? matches exactly one character.'}},
  {cat:1, q:{es:'Comando para ver historial',en:'History command'}, opts:{es:['hist','history','cmdlog','bash hist'],en:['hist','history','cmdlog','bash hist']}, ans:1, exp:{es:'history muestra el historial de comandos.',en:'history shows command history.'}},
  {cat:1, q:{es:'head -n 5 archivo muestra:',en:'head -n 5 file shows:'}, opts:{es:['Primeras 5 líneas','Últimas 5 líneas','Línea 5','Borra líneas'],en:['First 5 lines','Last 5 lines','Line 5','Deletes lines']}, ans:0, exp:{es:'head -n 5 = primeras 5 líneas.',en:'head -n 5 = first 5 lines.'}},
  {cat:1, q:{es:'¿Qué hace cd ..?',en:'What does cd .. do?'}, opts:{es:['Ir a home','Subir un nivel','Ir a raíz','Ir al directorio anterior'],en:['Go home','Go up one level','Go to root','Go to previous dir']}, ans:1, exp:{es:'.. = directorio padre, sube un nivel.',en:'.. = parent directory, goes up one level.'}},

  // Kernel (cat:2)
  {cat:2, q:{es:'PID 1 en sistemas modernos',en:'PID 1 in modern systems'}, opts:{es:['bash','kernel','systemd','init.d'],en:['bash','kernel','systemd','init.d']}, ans:2, exp:{es:'systemd es el primer proceso.',en:'systemd is the first process.'}},
  {cat:2, q:{es:'¿Qué contiene /proc por proceso?',en:'What does /proc contain per process?'}, opts:{es:['Falso','Verdadero (subdirectorios por PID)','Solo root','No contiene'],en:['False','True (subdirectories per PID)','Root only','Does not']}, ans:1, exp:{es:'/proc tiene subdirectorios con el PID de cada proceso.',en:'/proc has subdirectories per PID.'}},
  {cat:2, q:{es:'¿Qué comando muestra la versión del kernel?',en:'What command shows kernel version?'}, opts:{es:['kernel --version','uname -r','cat /proc/version','B y C son correctas'],en:['kernel --version','uname -r','cat /proc/version','B and C']}, ans:3, exp:{es:'uname -r o cat /proc/version muestran la versión.',en:'uname -r or cat /proc/version show the version.'}},
  {cat:2, q:{es:'Los módulos del kernel son:',en:'Kernel modules are:'}, opts:{es:['Programas de usuario','Código cargable dinámicamente','Archivos de configuración','Scripts de inicio'],en:['User programs','Dynamically loadable code','Config files','Startup scripts']}, ans:1, exp:{es:'Los módulos se cargan/descargan sin reiniciar.',en:'Modules are loaded/unloaded without reboot.'}},

  // Package Management (cat:3)
  {cat:3, q:{es:'Gestor de paquetes Debian/Ubuntu',en:'Debian/Ubuntu package manager'}, opts:{es:['rpm','yum','apt','pacman'],en:['rpm','yum','apt','pacman']}, ans:2, exp:{es:'APT es el gestor avanzado de Debian/Ubuntu.',en:'APT is the advanced package tool for Debian/Ubuntu.'}},
  {cat:3, q:{es:'¿Qué significa RPM?',en:'RPM stands for?'}, opts:{es:['RPM Package Management','Return Package Management','Relocate Package Manager','Recursive Package Manager'],en:['RPM Package Management','Return Package Management','Relocate Package Manager','Recursive Package Manager']}, ans:0, exp:{es:'RPM = RPM Package Management (originalmente Red Hat).',en:'RPM = RPM Package Management (originally Red Hat).'}},
  {cat:3, q:{es:'Extensión de paquete Debian',en:'Debian package extension'}, opts:{es:['.rpm','.pkg','.deb','.apt'],en:['.rpm','.pkg','.deb','.apt']}, ans:2, exp:{es:'.deb es el formato de Debian/Ubuntu.',en:'.deb is Debian/Ubuntu format.'}},
  {cat:3, q:{es:'¿Qué comando actualiza la lista de paquetes en apt?',en:'What apt command updates package list?'}, opts:{es:['apt upgrade','apt refresh','apt update','apt-get sync'],en:['apt upgrade','apt refresh','apt update','apt-get sync']}, ans:2, exp:{es:'apt update descarga metadatos de los repositorios.',en:'apt update downloads metadata from repositories.'}},
  {cat:3, q:{es:'Extraer backup.tar.bz2 correctamente',en:'Extract backup.tar.bz2 correctly'}, opts:{es:['tar -xf backup.tar.bz2','tar -xzf backup.tar.bz2','tar -xjf backup.tar.bz2','tar -xJf backup.tar.bz2'],en:['tar -xf file','tar -xzf file','tar -xjf file','tar -xJf file']}, ans:2, exp:{es:'.tar.bz2 necesita -j (bzip2).',en:'.tar.bz2 needs -j (bzip2).'}},
  {cat:3, q:{es:'Opción de tar para comprimir con bzip2',en:'tar option for bzip2'}, opts:{es:['-z','-j','-J','-b'],en:['-z','-j','-J','-b']}, ans:1, exp:{es:'-j = bzip2, -z = gzip, -J = xz.',en:'-j = bzip2, -z = gzip, -J = xz.'}},

  // Filesystem (cat:4)
  {cat:4, q:{es:'Directorio de configuración del sistema',en:'System config directory'}, opts:{es:['/bin','/etc','/var','/usr'],en:['/bin','/etc','/var','/usr']}, ans:1, exp:{es:'/etc contiene archivos de configuración.',en:'/etc holds configuration files.'}},
  {cat:4, q:{es:'¿Qué archivo se consulta PRIMERO para resolver google.com?',en:'Which file is checked FIRST to resolve google.com?'}, opts:{es:['/etc/resolv.conf','/etc/dns.conf','/etc/hosts','/etc/nsswitch.conf'],en:['/etc/resolv.conf','/etc/dns.conf','/etc/hosts','/etc/nsswitch.conf']}, ans:2, exp:{es:'/etc/hosts tiene prioridad sobre DNS.',en:'/etc/hosts has priority over DNS.'}},
  {cat:4, q:{es:'Directorio de dispositivos',en:'Devices directory'}, opts:{es:['/proc','/sys','/dev','/etc'],en:['/proc','/sys','/dev','/etc']}, ans:2, exp:{es:'/dev contiene archivos de dispositivo.',en:'/dev holds device files.'}},
  {cat:4, q:{es:'¿Dónde se montan discos externos típicamente?',en:'External disk mount point?'}, opts:{es:['/data','/mnt','/media','/mount'],en:['/data','/mnt','/media','/mount']}, ans:2, exp:{es:'/media para montaje automático, /mnt para manual.',en:'/media for auto-mount, /mnt for manual.'}},
  {cat:4, q:{es:'¿Qué es un hard link?',en:'What is a hard link?'}, opts:{es:['Enlace simbólico','Apunta al inodo directamente','Puede cruzar sistemas de archivos','Apunta a una ruta'],en:['Symbolic link','Points directly to inode','Can cross filesystems','Points to a path']}, ans:1, exp:{es:'Un hard link apunta al inodo del archivo.',en:'A hard link points directly to the file inode.'}},

  // Scripting (cat:5)
  {cat:5, q:{es:'Leer entrada del usuario en script',en:'Read user input in script'}, opts:{es:['input','$1','gets','read'],en:['input','$1','gets','read']}, ans:3, exp:{es:'read variable lee desde stdin.',en:'read reads from stdin.'}},
  {cat:5, q:{es:'¿Qué contiene $? después de un comando?',en:'What is in $? after a command?'}, opts:{es:['Número de argumentos','Nombre del comando','Código de salida del comando anterior','PID'],en:['Argument count','Command name','Exit code of previous command','PID']}, ans:2, exp:{es:'$? contiene el código de salida (0 = éxito).',en:'$? holds exit status (0 = success).'}},
  {cat:5, q:{es:'Asignar "Hello" a variable',en:'Assign "Hello" to variable'}, opts:{es:['A="Hello"','A = "Hello"','echo "Hello" > A','$A="Hello"'],en:['A="Hello"','A = "Hello"','echo "Hello" > A','$A="Hello"']}, ans:0, exp:{es:'En bash: variable=valor sin espacios.',en:'In bash: variable=value no spaces.'}},
  {cat:5, q:{es:'Guardar directorio actual en variable',en:'Save current dir to variable'}, opts:{es:['pwd $A','A=cwd','pwd | $A','A=$(pwd)'],en:['pwd $A','A=cwd','pwd | $A','A=$(pwd)']}, ans:3, exp:{es:'A=$(pwd) captura la salida de pwd.',en:'A=$(pwd) captures pwd output.'}},
  {cat:5, q:{es:'Variable con PID del shell actual',en:'Variable with current shell PID'}, opts:{es:['$!','$?','$$','$0'],en:['$!','$?','$$','$0']}, ans:2, exp:{es:'$$ = PID del shell actual.',en:'$$ = current shell PID.'}},
  {cat:5, q:{es:'Variable con todos los argumentos del script',en:'Variable with all script arguments'}, opts:{es:['$@','$0','$#','$?'],en:['$@','$0','$#','$?']}, ans:0, exp:{es:'$@ lista todos los argumentos.',en:'$@ lists all arguments.'}},
  {cat:5, q:{es:'while true; do echo hola; done → ¿qué hace?',en:'while true; do echo hi; done → what does it do?'}, opts:{es:['Error','Una vez','Bucle infinito','Depende'],en:['Error','Once','Infinite loop','Depends']}, ans:2, exp:{es:'true siempre éxito → bucle infinito.',en:'true always success → infinite loop.'}},
  {cat:5, q:{es:'Nombre del shell actual',en:'Current shell name'}, opts:{es:['$!','$#','$0','$?'],en:['$!','$#','$0','$?']}, ans:2, exp:{es:'$0 contiene el nombre del script/shell.',en:'$0 holds script/shell name.'}},

  {cat:6, q:{es:'Permiso SUID en ejecutable',en:'SUID on executable'}, opts:{es:['Ejecuta como grupo','Ejecuta como dueño','Evita borrado','Comprime archivo'],en:['Runs as group','Runs as owner','Prevents delete','Compresses']}, ans:1, exp:{es:'SUID ejecuta con permisos del dueño.',en:'SUID runs with owner privileges.'}},

  {cat:6, q:{es:'umask 027 → permisos de nuevo archivo',en:'umask 027 → new file permissions'}, opts:{es:['rwxr-x---','rw-r-----','rw-r--r--','rwxrwx---'],en:['rwxr-x---','rw-r-----','rw-r--r--','rwxrwx---']}, ans:1, exp:{es:'666 - 027 = 640 → rw-r-----',en:'666 - 027 = 640 → rw-r-----'}},

  {cat:6, q:{es:'En /etc/group, el segundo campo contiene:',en:'In /etc/group, second field contains:'}, opts:{es:['Nombre grupo','Contraseña (hash o x)','GID','Lista usuarios'],en:['Group name','Password (hash or x)','GID','User list']}, ans:1, exp:{es:'campo2 = contraseña del grupo (normalmente x).',en:'field2 = group password (usually x).'}},

  // ============================================================
  {cat:5, q:{es:'Después de ejecutar "ls /root" sin permisos, ¿qué contiene $?',en:'After "ls /root" without permission, what is in $?'}, opts:{es:['"Permission denied"','0','Número distinto de cero','Nada'],en:['Permission denied','0','Non-zero number','Nothing']}, ans:2, exp:{es:'$? guarda el código de salida (≠0 si error).',en:'$? holds exit status (≠0 on error).'}},

];

const CAT_NAMES = ['Hardware', 'Command Line', 'Kernel', 'Package Mgmt', 'Filesystem', 'Scripting', 'Security', 'Networking', 'Open Source', 'Working with Linux'];
const TEXTS = {
  es: { all:'Examen completo', cat:'Por categoría', wrong:'Solo falladas', start:'▶ Iniciar', next:'Siguiente →', end:'⏹ Terminar', total:'Total', correct:'Correctas', wrong2:'Falladas', score:'Score', q:'Pregunta', of:'de', correct_msg:'✓ ¡Correcto!', wrong_msg:'✗ Incorrecto', explanation:'Explicación:', pick_cat:'Elige categoría:', restart:'🔁 Repetir', menu:'🏠 Menú', no_wrong:'Sin falladas aún.', results_title:'Resultados', passed:'¡Aprobado!', failed:'Repasa más' },
  en: { all:'Full exam', cat:'By category', wrong:'Wrong only', start:'▶ Start', next:'Next →', end:'⏹ End', total:'Total', correct:'Correct', wrong2:'Wrong', score:'Score', q:'Question', of:'of', correct_msg:'✓ Correct!', wrong_msg:'✗ Wrong', explanation:'Explanation:', pick_cat:'Pick category:', restart:'🔁 Retry', menu:'🏠 Menu', no_wrong:'No wrong answers yet.', results_title:'Results', passed:'Passed!', failed:'Study more' }
};

let lang = 'es', mode = 'all', selectedCat = -1, queue = [], currentIdx = 0, answered = false, correctCount = 0, wrongCount = 0, wrongList = [], catStats = {};

function updateUITexts() { let t=TEXTS[lang]; document.getElementById('lbl-all').innerText=t.all; document.getElementById('lbl-cat').innerText=t.cat; document.getElementById('lbl-wrong').innerText=t.wrong; document.getElementById('start-btn').innerHTML=t.start; document.getElementById('lbl-total').innerText=t.total; document.getElementById('lbl-correct').innerText=t.correct; document.getElementById('lbl-wrong2').innerText=t.wrong2; document.getElementById('lbl-score').innerText=t.score; document.getElementById('btn-end').innerText=t.end; }
function setLang(l){ lang=l; document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active', i===(l==='es'?0:1))); updateUITexts(); if(mode==='cat') renderCatPicker(); if(currentIdx<queue.length&&!document.getElementById('exam-screen').classList.contains('hidden')) renderQuestion(); }
function setMode(m){ mode=m; ['all','cat','wrong'].forEach(id=>document.getElementById(`mode-${id}`).classList.toggle('active', mode===id)); document.getElementById('cat-picker').classList.toggle('hidden', mode!=='cat'); if(mode==='cat') renderCatPicker(); }
function renderCatPicker(){ let p=document.getElementById('cat-picker'); p.innerHTML=`<p style="font-size:0.8rem;">${TEXTS[lang].pick_cat}</p>`; CAT_NAMES.forEach((c,i)=>{ let b=document.createElement('button'); b.innerText=c; b.className='cat-opt-btn'; b.onclick=()=>{ selectedCat=i; document.querySelectorAll('.cat-opt-btn').forEach(btn=>btn.classList.remove('correct')); b.classList.add('correct'); }; p.appendChild(b); }); }
function buildQueue(){ let pool = mode==='all' ? [...QUESTIONS] : mode==='cat' ? QUESTIONS.filter(q=>q.cat===selectedCat) : QUESTIONS.filter((_,idx)=>wrongList.includes(idx)); for(let i=pool.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; } return pool; }
function startExam(){ if(mode==='wrong'&&wrongList.length===0){ alert(TEXTS[lang].no_wrong); return; } if(mode==='cat'&&selectedCat===-1){ alert(TEXTS[lang].pick_cat); return; } queue=buildQueue(); currentIdx=0; correctCount=0; wrongCount=0; catStats={}; answered=false; document.getElementById('mode-screen').classList.add('hidden'); document.getElementById('results-screen').classList.add('hidden'); document.getElementById('exam-screen').classList.remove('hidden'); updateStats(); renderQuestion(); }
function renderQuestion(){ if(currentIdx>=queue.length){ showResults(); return; } let q=queue[currentIdx]; answered=false; document.getElementById('cat-label').innerHTML=CAT_NAMES[q.cat]; document.getElementById('q-num').innerHTML=`${TEXTS[lang].q} ${currentIdx+1} ${TEXTS[lang].of} ${queue.length}`; document.getElementById('q-text').innerHTML=q.q[lang]; let optsDiv=document.getElementById('options-container'); optsDiv.innerHTML=''; q.opts[lang].forEach((opt,i)=>{ let btn=document.createElement('button'); btn.className='option-btn'; btn.innerHTML=`<span class="opt-letter">${String.fromCharCode(65+i)}.</span> ${opt}`; btn.onclick=()=>checkAnswer(i,btn,q); optsDiv.appendChild(btn); }); document.getElementById('feedback').classList.add('hidden'); document.getElementById('btn-next').classList.add('hidden'); document.getElementById('progress').style.width=`${(currentIdx/queue.length)*100}%`; }
function checkAnswer(selectedIdx, btn, q){ if(answered) return; answered=true; let isCorrect=(selectedIdx===q.ans); let allBtns=document.querySelectorAll('.option-btn'); allBtns.forEach((b,i)=>{ b.disabled=true; if(i===q.ans) b.classList.add('correct'); if(i===selectedIdx&&!isCorrect) b.classList.add('wrong'); }); let fb=document.getElementById('feedback'); fb.className=`feedback-panel ${isCorrect?'correct':'wrong'}`; fb.innerHTML=`<div class="feedback-title">${isCorrect?TEXTS[lang].correct_msg:TEXTS[lang].wrong_msg}</div><div><strong>${TEXTS[lang].explanation}</strong> ${q.exp[lang]}</div>`; fb.classList.remove('hidden'); let globalIdx=QUESTIONS.findIndex(p=>p===q); if(isCorrect){ correctCount++; if(wrongList.includes(globalIdx)) wrongList=wrongList.filter(i=>i!==globalIdx); } else { wrongCount++; if(!wrongList.includes(globalIdx)) wrongList.push(globalIdx); } if(!catStats[q.cat]) catStats[q.cat]={c:0,w:0}; isCorrect?catStats[q.cat].c++:catStats[q.cat].w++; updateStats(); let nextBtn=document.getElementById('btn-next'); nextBtn.classList.remove('hidden'); nextBtn.innerText=currentIdx===queue.length-1?(lang==='es'?'Ver resultados →':'Show results →'):TEXTS[lang].next; }
function updateStats(){ let total=correctCount+wrongCount; document.getElementById('s-total').innerText=total; document.getElementById('s-correct').innerText=correctCount; document.getElementById('s-wrong').innerText=wrongCount; document.getElementById('s-score').innerText=total?Math.round((correctCount/total)*100)+'%':'0%'; }
function nextQuestion(){ currentIdx++; renderQuestion(); }
function endExam(){ showResults(); }
function showResults(){ document.getElementById('exam-screen').classList.add('hidden'); let pct=queue.length?Math.round((correctCount/queue.length)*100):0; let passed=pct>=80; let catHtml=''; Object.entries(catStats).forEach(([c,st])=>{ let tot=st.c+st.w; let per=tot?Math.round((st.c/tot)*100):0; catHtml+=`<div class="cat-row"><span>${CAT_NAMES[c]}</span><span style="color:${per>=80?'#16a34a':'#ef4444'}">${st.c}/${tot} (${per}%)</span></div>`; }); document.getElementById('results-screen').innerHTML=`<div class="results-card"><h2>${TEXTS[lang].results_title}</h2><div class="score-ring"><div class="score-inner"><span style="font-size:2rem;font-weight:700;">${pct}%</span><span style="font-size:0.75rem;">${passed?TEXTS[lang].passed:TEXTS[lang].failed}</span></div></div><p>${correctCount} ${TEXTS[lang].correct} / ${queue.length} — ${TEXTS[lang].wrong2}: ${wrongCount}</p>${catHtml?'<div class="cat-results-list">'+catHtml+'</div>':''}<div style="display:flex;gap:0.7rem;justify-content:center;"><button class="btn btn-primary" onclick="startExam()">${TEXTS[lang].restart}</button><button class="btn" onclick="goMenu()">${TEXTS[lang].menu}</button></div></div>`; document.getElementById('results-screen').classList.remove('hidden'); }
function goMenu(){ document.getElementById('results-screen').classList.add('hidden'); document.getElementById('mode-screen').classList.remove('hidden'); document.getElementById('exam-screen').classList.add('hidden'); currentIdx=0; correctCount=0; wrongCount=0; answered=false; }

window.setLang=setLang; window.setMode=setMode; window.startExam=startExam; window.nextQuestion=nextQuestion; window.endExam=endExam; window.goMenu=goMenu;
updateUITexts();
</script>
