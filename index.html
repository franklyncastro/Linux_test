  <style>
    /* === MISMO ESTILO QUE ANTES (se mantiene) === */

    .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }

    .stat-card.wrong .stat-number { color: var(--accent-error); }
    .stat-card.score .stat-number { color: var(--accent-primary); }
    .progress-wrapper { background: var(--surface-tertiary); border-radius: 100px; height: 6px; margin-bottom: 1.25rem; overflow: hidden; }
    .progress-fill { background: var(--accent-success); height: 100%; width: 0%; transition: width 0.3s ease; }
    .cat-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--surface-secondary); padding: 0.25rem 1rem; border-radius: 40px; font-size: 0.75rem; margin-bottom: 1rem; border: 1px solid var(--border-light); }
    .question-card { background: var(--surface-primary); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; box-shadow: var(--shadow-sm); }

    .option-btn { text-align: left; padding: 0.9rem 1rem; background: var(--surface-primary); border: 1px solid var(--border-medium); border-radius: var(--radius-md); font-size: 0.95rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 0.6rem; color: var(--text-primary); }
    .option-btn:hover:not(:disabled) { background: var(--surface-secondary); border-color: var(--accent-primary); transform: translateX(4px); }
    .option-btn.correct { background: var(--accent-success-bg); border-color: var(--accent-success); color: var(--accent-success); }
    .option-btn.wrong { background: var(--accent-error-bg); border-color: var(--accent-error); color: var(--accent-error); }
    .opt-letter { font-weight: 700; min-width: 28px; }
    .feedback-panel { padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1.25rem; border-left: 4px solid; }
    .feedback-panel.correct { background: var(--accent-success-bg); border-left-color: var(--accent-success); }
    .feedback-panel.wrong { background: var(--accent-error-bg); border-left-color: var(--accent-error); }
    .feedback-title { font-weight: 700; margin-bottom: 0.25rem; }
    .action-buttons { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 60px; font-weight: 500; border: 1px solid var(--border-medium); background: var(--surface-primary); cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }

    .mode-btn { flex: 1; background: var(--surface-secondary); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 0.8rem 0.2rem; text-align: center; cursor: pointer; transition: all 0.2s; font-weight: 500; }

    .mode-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
    .cat-picker { display: flex; flex-wrap: wrap; gap: 0.6rem; margin: 1rem 0; }
    .cat-opt-btn { background: var(--surface-secondary); border: 1px solid var(--border-light); border-radius: 60px; padding: 0.45rem 1rem; font-size: 0.8rem; cursor: pointer; }
    .cat-opt-btn.correct { background: var(--accent-primary); color: white; }
    .results-card { text-align: center; padding: 1.8rem; background: var(--surface-primary); border-radius: var(--radius-lg); }
    .score-ring { width: 130px; height: 130px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 1rem auto; background: var(--surface-secondary); }
    .score-inner { background: var(--surface-primary); width: 105px; height: 105px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .cat-results-list { display: flex; flex-direction: column; gap: 0.6rem; margin: 1rem 0; text-align: left; }
    .cat-row { display: flex; justify-content: space-between; background: var(--surface-secondary); padding: 0.6rem 1rem; border-radius: var(--radius-md); }
    .hidden { display: none !important; }
    footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; color: var(--text-muted); }
    @media (max-width: 560px) { .stat-number { font-size: 1.4rem; } .question-text { font-size: 1rem; } }

<body>
<div class="app-container" id="app">
  <div class="header">
    <h1>🧠 LPI Linux Essentials 010-160</h1>
    <p>100 preguntas únicas | Modo experto + Preview LPI-1</p>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('es')">🇪🇸 Español</button>
      <button class="lang-btn" onclick="setLang('en')">🇬🇧 English</button>
    </div>
  </div>

  <div id="mode-screen">
    <div class="mode-selector">
      <div class="mode-btn active" id="mode-all" onclick="setMode('all')"><span class="mode-icon">📋</span><span id="lbl-all">Examen completo</span></div>
      <div class="mode-btn" id="mode-cat" onclick="setMode('cat')"><span class="mode-icon">🎯</span><span id="lbl-cat">Por categoría</span></div>
      <div class="mode-btn" id="mode-wrong" onclick="setMode('wrong')"><span class="mode-icon">🔁</span><span id="lbl-wrong">Solo falladas</span></div>
    </div>
    <div id="cat-picker" class="hidden cat-picker"></div>
    <div style="text-align:center; margin-top: 1rem;">
      <button class="btn btn-primary" onclick="startExam()" id="start-btn">▶ Iniciar examen (100 preguntas)</button>
    </div>
  </div>

  <div id="exam-screen" class="hidden">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number" id="s-total">0</div><div class="stat-label" id="lbl-total">Total</div></div>
      <div class="stat-card correct"><div class="stat-number" id="s-correct">0</div><div class="stat-label" id="lbl-correct">Correctas</div></div>
      <div class="stat-card wrong"><div class="stat-number" id="s-wrong">0</div><div class="stat-label" id="lbl-wrong2">Falladas</div></div>
      <div class="stat-card score"><div class="stat-number" id="s-score">0%</div><div class="stat-label" id="lbl-score">Score</div></div>
    </div>
    <div class="progress-wrapper"><div class="progress-fill" id="progress"></div></div>
    <div class="cat-badge"><span>📂</span><span id="cat-label"></span></div>
    <div class="question-card">
      <div class="question-num" id="q-num"></div>
      <div class="question-text" id="q-text"></div>
      <div class="question-code hidden" id="q-code"></div>
    </div>
    <div class="options-grid" id="options-container"></div>
    <div class="feedback-panel hidden" id="feedback"></div>
    <div class="action-buttons">
      <button class="btn" onclick="endExam()" id="btn-end">⏹ Terminar</button>
      <button class="btn btn-primary hidden" onclick="nextQuestion()" id="btn-next">Siguiente →</button>
    </div>
  </div>
  <div id="results-screen" class="hidden"></div>
  <footer>100 preguntas únicas • Incluye preview LPI-1 • Explicaciones detalladas</footer>
</div>

<script>
// ==============================================================
// BANCO DE 100 PREGUNTAS ÚNICAS - LPI LINUX ESSENTIALS 010-160
// Categorías: 0=Hardware, 1=CLI, 2=Kernel, 3=Packages, 4=Filesystem,
// 5=Scripting, 6=Security, 7=Networking, 8=Licencias/OpenSource, 9=Admin
// ==============================================================
const QUESTIONS = [
  // ========== HARDWARE (8 preguntas) ==========
  {cat:0, q:{es:'¿Qué archivo contiene información de la CPU?',en:'Which file contains CPU info?'}, opts:{es:['/proc/cpuinfo','/sys/cpu','/etc/cpu','/var/cpuinfo'],en:['/proc/cpuinfo','/sys/cpu','/etc/cpu','/var/cpuinfo']}, ans:0, exp:{es:'/proc/cpuinfo es un archivo virtual con detalles del procesador (modelo, velocidad, flags).',en:'/proc/cpuinfo is a virtual file with CPU details (model, speed, flags).'}},
  {cat:0, q:{es:'¿Qué comando muestra la memoria RAM disponible?',en:'What command shows available RAM?'}, opts:{es:['meminfo','free -h','ram -h','vmstat'],en:['meminfo','free -h','ram -h','vmstat']}, ans:1, exp:{es:'free -h muestra memoria libre/usada en formato legible (GB/MB).',en:'free -h shows free/used memory in human-readable format.'}},
  {cat:0, q:{es:'¿Qué archivo lista los dispositivos PCI?',en:'Which file lists PCI devices?'}, opts:{es:['/proc/devices','/proc/pci','/sys/bus/pci/devices','/etc/pci.conf'],en:['/proc/devices','/proc/pci','/sys/bus/pci/devices','/etc/pci.conf']}, ans:2, exp:{es:'/sys/bus/pci/devices contiene dispositivos PCI. También se usa lspci.',en:'/sys/bus/pci/devices contains PCI devices. lspci is also used.'}},
  {cat:0, q:{es:'¿Qué comando lista dispositivos USB?',en:'What command lists USB devices?'}, opts:{es:['lsusb','lsdev','usb-list','listusb'],en:['lsusb','lsdev','usb-list','listusb']}, ans:0, exp:{es:'lsusb muestra todos los dispositivos USB conectados con fabricante y producto.',en:'lsusb shows all connected USB devices with manufacturer and product.'}},
  {cat:0, q:{es:'¿Cuál es el primer disco IDE en Linux?',en:'What is the first IDE disk in Linux?'}, opts:{es:['/dev/hd1','/dev/sda','/dev/hda','/dev/ide0'],en:['/dev/hd1','/dev/sda','/dev/hda','/dev/ide0']}, ans:2, exp:{es:'/dev/hda es el primer disco IDE maestro. Los SATA usan /dev/sda.',en:'/dev/hda is first IDE master disk. SATA uses /dev/sda.'}},
  {cat:0, q:{es:'¿Qué hace el BIOS/UEFI?',en:'What does BIOS/UEFI do?'}, opts:{es:['Gestionar archivos','Inicializar hardware y cargar bootloader','Administrar red','Gestionar permisos'],en:['Manage files','Initialize hardware and load bootloader','Manage network','Manage permissions']}, ans:1, exp:{es:'El BIOS/UEFI inicializa el hardware (POST) y carga el bootloader (GRUB).',en:'BIOS/UEFI initializes hardware (POST) and loads bootloader (GRUB).'}},
  {cat:0, q:{es:'¿Qué comando muestra hardware detallado?',en:'What command shows detailed hardware?'}, opts:{es:['lshw','hwinfo','dmidecode','Todas las anteriores'],en:['lshw','hwinfo','dmidecode','All of the above']}, ans:3, exp:{es:'lshw, hwinfo y dmidecode muestran información detallada del hardware.',en:'lshw, hwinfo and dmidecode show detailed hardware information.'}},
  {cat:0, q:{es:'¿Dónde se almacenan los archivos de dispositivos?',en:'Where are device files stored?'}, opts:{es:['/proc','/sys','/dev','/etc'],en:['/proc','/sys','/dev','/etc']}, ans:2, exp:{es:'/dev contiene archivos de dispositivo (discos, terminales, impresoras).',en:'/dev contains device files (disks, terminals, printers).'}},

  // ========== COMMAND LINE (12 preguntas) ==========
  {cat:1, q:{es:'¿Qué significa ~ en bash?',en:'What does ~ mean in bash?'}, opts:{es:['Directorio actual','Directorio home','Directorio raíz','Directorio anterior'],en:['Current directory','Home directory','Root directory','Previous directory']}, ans:1, exp:{es:'~ es el atajo al directorio home del usuario actual.',en:'~ is shortcut to current user\'s home directory.'}},
  {cat:1, q:{es:'¿Qué comando muestra el directorio actual?',en:'What command shows current directory?'}, opts:{es:['pwd','cwd','dir','ls -d'],en:['pwd','cwd','dir','ls -d']}, ans:0, exp:{es:'pwd = Print Working Directory. Muestra la ruta completa.',en:'pwd = Print Working Directory. Shows full path.'}},
  {cat:1, q:{es:'¿Qué hace "ls -la"?',en:'What does "ls -la" do?'}, opts:{es:['Lista orden inverso','Lista todos los archivos incluyendo ocultos en formato largo','Lista solo enlaces','Lista con permisos extendidos'],en:['Lists reverse order','Lists all files including hidden in long format','Lists only links','Lists with extended permissions']}, ans:1, exp:{es:'-l = formato largo, -a = muestra archivos ocultos (que empiezan con .).',en:'-l = long format, -a = shows hidden files (starting with .).'}},
  {cat:1, q:{es:'El comodín "?" en glob significa:',en:'The "?" wildcard in glob means:'}, opts:{es:['Cualquier cadena','Un solo carácter','Ninguno','Lista de opciones'],en:['Any string','Single character','None','List of options']}, ans:1, exp:{es:'? coincide con exactamente un carácter. Ej: file?.txt → file1.txt',en:'? matches exactly one character. Eg: file?.txt → file1.txt'}},
  {cat:1, q:{es:'¿Qué comando muestra el historial de comandos?',en:'What command shows command history?'}, opts:{es:['history','hist','cmdlog','bash-history'],en:['history','hist','cmdlog','bash-history']}, ans:0, exp:{es:'history muestra el historial de comandos. !! ejecuta el último.',en:'history shows command history. !! runs the last command.'}},
  {cat:1, q:{es:'¿Qué hace "head -n 5 archivo"?',en:'What does "head -n 5 file" do?'}, opts:{es:['Primeras 5 líneas','Últimas 5 líneas','Línea 5','Borra líneas'],en:['First 5 lines','Last 5 lines','Line 5','Deletes lines']}, ans:0, exp:{es:'head -n 5 muestra las primeras 5 líneas del archivo.',en:'head -n 5 shows the first 5 lines of the file.'}},
  {cat:1, q:{es:'¿Qué hace "cd .."?',en:'What does "cd .." do?'}, opts:{es:['Ir a home','Subir un nivel','Ir a raíz','Ir al directorio anterior'],en:['Go home','Go up one level','Go to root','Go to previous directory']}, ans:1, exp:{es:'.. = directorio padre. cd .. sube un nivel en el árbol.',en:'.. = parent directory. cd .. goes up one level.'}},
  {cat:1, q:{es:'¿Qué es el pipe (|) en la línea de comandos?',en:'What is the pipe (|) on the command line?'}, opts:{es:['Redirige a archivo','Conecta stdout de un comando al stdin de otro','Ejecuta en paralelo','Agrupa comandos'],en:['Redirects to file','Connects stdout of one command to stdin of another','Runs in parallel','Groups commands']}, ans:1, exp:{es:'El pipe conecta la salida de un comando con la entrada del siguiente. Ej: ls | grep .txt',en:'Pipe connects output of one command to input of another. Eg: ls | grep .txt'}},
  {cat:1, q:{es:'¿Cómo rediriges stderr a un archivo?',en:'How do you redirect stderr to a file?'}, opts:{es:['> archivo','2> archivo','&> archivo','< archivo'],en:['> file','2> file','&> file','< file']}, ans:1, exp:{es:'2> archivo redirige solo stderr (errores). 1> o > redirige stdout.',en:'2> file redirects only stderr. 1> or > redirects stdout.'}},
  {cat:1, q:{es:'¿Qué hace el comando "man"?',en:'What does the "man" command do?'}, opts:{es:['Muestra el manual de un comando','Muestra el menú','Maneja archivos','Manda un mensaje'],en:['Shows manual of a command','Shows menu','Manages files','Sends a message']}, ans:0, exp:{es:'man muestra la página del manual de un comando. Ej: man ls',en:'man shows the manual page of a command. Eg: man ls'}},
  {cat:1, q:{es:'¿Qué comando busca archivos por nombre?',en:'What command searches files by name?'}, opts:{es:['grep','find','locate','B y C son correctas'],en:['grep','find','locate','B and C are correct']}, ans:3, exp:{es:'find busca en tiempo real, locate usa una base de datos. Ambos buscan por nombre.',en:'find searches in real time, locate uses a database. Both search by name.'}},
  {cat:1, q:{es:'¿Qué hace "echo $HOME"?',en:'What does "echo $HOME" do?'}, opts:{es:['Imprime "HOME"','Imprime el directorio home','Asigna la variable HOME','Borra HOME'],en:['Prints "HOME"','Prints the home directory','Assigns HOME variable','Deletes HOME']}, ans:1, exp:{es:'$HOME expande la variable y echo la imprime. Muestra el home del usuario.',en:'$HOME expands the variable and echo prints it. Shows user home.'}},

  // ========== KERNEL (6 preguntas) ==========
  {cat:2, q:{es:'¿Qué PID tiene systemd/init?',en:'What PID does systemd/init have?'}, opts:{es:['0','100','1','Depende de la distro'],en:['0','100','1','Depends on distro']}, ans:2, exp:{es:'El primer proceso siempre tiene PID 1. En sistemas modernos es systemd.',en:'The first process always has PID 1. On modern systems it is systemd.'}},
  {cat:2, q:{es:'¿Qué contiene /proc?',en:'What does /proc contain?'}, opts:{es:['Archivos del sistema','Información de procesos y kernel','Configuración de red','Logs del sistema'],en:['System files','Process and kernel information','Network configuration','System logs']}, ans:1, exp:{es:'/proc es un sistema de archivos virtual con información de procesos y kernel.',en:'/proc is a virtual filesystem with process and kernel information.'}},
  {cat:2, q:{es:'¿Qué comando muestra la versión del kernel?',en:'What command shows the kernel version?'}, opts:{es:['uname -r','cat /proc/version','kernel --version','A y B son correctas'],en:['uname -r','cat /proc/version','kernel --version','A and B are correct']}, ans:3, exp:{es:'uname -r y cat /proc/version muestran la versión del kernel en ejecución.',en:'uname -r and cat /proc/version show the running kernel version.'}},
  {cat:2, q:{es:'Los módulos del kernel son:',en:'Kernel modules are:'}, opts:{es:['Programas de usuario','Código cargable dinámicamente','Archivos de configuración','Scripts de inicio'],en:['User programs','Dynamically loadable code','Configuration files','Startup scripts']}, ans:1, exp:{es:'Los módulos son drivers que se cargan/descargan sin reiniciar (lsmod, modprobe).',en:'Modules are drivers that load/unload without reboot (lsmod, modprobe).'}},
  {cat:2, q:{es:'¿Qué comando lista los módulos cargados?',en:'What command lists loaded modules?'}, opts:{es:['lsmod','modinfo','modlist','ls -mod'],en:['lsmod','modinfo','modlist','ls -mod']}, ans:0, exp:{es:'lsmod muestra los módulos del kernel cargados actualmente.',en:'lsmod shows currently loaded kernel modules.'}},
  {cat:2, q:{es:'¿Qué hace "dmesg"?',en:'What does "dmesg" do?'}, opts:{es:['Muestra mensajes del kernel','Muestra el uso de disco','Muestra la memoria','Muestra los procesos'],en:['Shows kernel messages','Shows disk usage','Shows memory','Shows processes']}, ans:0, exp:{es:'dmesg muestra el buffer de mensajes del kernel (útil para diagnosticar hardware).',en:'dmesg shows the kernel message buffer (useful for hardware diagnostics).'}},

  // ========== PACKAGE MANAGEMENT (10 preguntas) ==========
  {cat:3, q:{es:'Gestor de paquetes de Debian/Ubuntu',en:'Debian/Ubuntu package manager'}, opts:{es:['rpm','yum','apt','dnf'],en:['rpm','yum','apt','dnf']}, ans:2, exp:{es:'APT (Advanced Package Tool) es el gestor de Debian/Ubuntu.',en:'APT (Advanced Package Tool) is the manager for Debian/Ubuntu.'}},
  {cat:3, q:{es:'¿Qué significa RPM?',en:'What does RPM mean?'}, opts:{es:['RPM Package Management','Return Package Manager','Relocate Package Manager','Red Hat Package Manager (original)'],en:['RPM Package Management','Return Package Manager','Relocate Package Manager','Red Hat Package Manager (original)']}, ans:3, exp:{es:'RPM originalmente significaba Red Hat Package Manager. Ahora es RPM Package Management.',en:'RPM originally meant Red Hat Package Manager. Now it\'s RPM Package Management.'}},
  {cat:3, q:{es:'Extensión de paquete Debian',en:'Debian package extension'}, opts:{es:['.rpm','.pkg','.deb','.tgz'],en:['.rpm','.pkg','.deb','.tgz']}, ans:2, exp:{es:'.deb es el formato de paquete de Debian/Ubuntu.',en:'.deb is the Debian/Ubuntu package format.'}},
  {cat:3, q:{es:'¿Qué comando actualiza la lista de paquetes en apt?',en:'What apt command updates package list?'}, opts:{es:['apt upgrade','apt update','apt refresh','apt-get sync'],en:['apt upgrade','apt update','apt refresh','apt-get sync']}, ans:1, exp:{es:'apt update descarga la lista de paquetes de los repositorios.',en:'apt update downloads package list from repositories.'}},
  {cat:3, q:{es:'¿Qué comando instala un paquete en Red Hat/RHEL?',en:'What command installs a package on Red Hat/RHEL?'}, opts:{es:['apt install','yum install','dnf install','B y C son correctas'],en:['apt install','yum install','dnf install','B and C are correct']}, ans:3, exp:{es:'En RHEL 7 usa yum, en RHEL 8+ usa dnf. Ambos funcionan.',en:'RHEL 7 uses yum, RHEL 8+ uses dnf. Both work.'}},
  {cat:3, q:{es:'¿Dónde se configuran los repositorios en RHEL/Fedora?',en:'Where are repositories configured in RHEL/Fedora?'}, opts:{es:['/etc/apt/sources.list','/etc/yum.repos.d/','/etc/dnf/dnf.conf','/etc/repos.d/'],en:['/etc/apt/sources.list','/etc/yum.repos.d/','/etc/dnf/dnf.conf','/etc/repos.d/']}, ans:1, exp:{es:'En RHEL/Fedora los repositorios están en /etc/yum.repos.d/*.repo',en:'In RHEL/Fedora repositories are in /etc/yum.repos.d/*.repo'}},
  {cat:3, q:{es:'¿Qué hace "apt purge"?',en:'What does "apt purge" do?'}, opts:{es:['Elimina el paquete','Elimina el paquete Y sus archivos de configuración','Actualiza el paquete','Reinstala el paquete'],en:['Removes the package','Removes the package AND its configuration files','Updates the package','Reinstalls the package']}, ans:1, exp:{es:'apt purge elimina el paquete y sus archivos de configuración. apt remove solo elimina.',en:'apt purge removes the package AND its configuration files. apt remove only removes.'}},
  {cat:3, q:{es:'¿Qué comando muestra todos los paquetes instalados en RPM?',en:'What command shows all installed RPM packages?'}, opts:{es:['rpm -qa','rpm -ql','rpm -qi','rpm -qf'],en:['rpm -qa','rpm -ql','rpm -qi','rpm -qf']}, ans:0, exp:{es:'rpm -qa lista todos los paquetes instalados. -ql lista archivos, -qi información.',en:'rpm -qa lists all installed packages. -ql lists files, -qi info.'}},
  {cat:3, q:{es:'¿Qué es un paquete "dependencia"?',en:'What is a package "dependency"?'}, opts:{es:['Un paquete opcional','Un paquete que otro necesita para funcionar','Un paquete de seguridad','Un paquete de desarrollo'],en:['An optional package','A package that another needs to work','A security package','A development package']}, ans:1, exp:{es:'Una dependencia es un paquete que otro requiere para funcionar correctamente.',en:'A dependency is a package that another requires to work correctly.'}},
  {cat:3, q:{es:'¿Qué comando busca un paquete en los repositorios de apt?',en:'What command searches for a package in apt repositories?'}, opts:{es:['apt search','apt-cache search','apt find','A y B son correctas'],en:['apt search','apt-cache search','apt find','A and B are correct']}, ans:3, exp:{es:'Tanto apt search como apt-cache search buscan paquetes en los repositorios.',en:'Both apt search and apt-cache search look for packages in repositories.'}},

  // ========== FILESYSTEM (10 preguntas) ==========
  {cat:4, q:{es:'Directorio de configuración del sistema',en:'System configuration directory'}, opts:{es:['/bin','/etc','/var','/usr'],en:['/bin','/etc','/var','/usr']}, ans:1, exp:{es:'/etc (et cetera) contiene archivos de configuración del sistema.',en:'/etc (et cetera) contains system configuration files.'}},
  {cat:4, q:{es:'¿Qué archivo se consulta PRIMERO para resolver nombres?',en:'Which file is checked FIRST for name resolution?'}, opts:{es:['/etc/resolv.conf','/etc/hosts','/etc/dns.conf','/etc/nsswitch.conf'],en:['/etc/resolv.conf','/etc/hosts','/etc/dns.conf','/etc/nsswitch.conf']}, ans:1, exp:{es:'/etc/hosts tiene prioridad sobre DNS. Primero consulta local, luego DNS.',en:'/etc/hosts has priority over DNS. Check local first, then DNS.'}},
  {cat:4, q:{es:'Directorio de dispositivos',en:'Devices directory'}, opts:{es:['/dev','/proc','/sys','/etc'],en:['/dev','/proc','/sys','/etc']}, ans:0, exp:{es:'/dev contiene archivos de dispositivo (discos, terminales, USB).',en:'/dev contains device files (disks, terminals, USB).'}},
  {cat:4, q:{es:'Punto de montaje típico para discos externos',en:'Typical mount point for external disks'}, opts:{es:['/data','/mnt','/media','/mount'],en:['/data','/mnt','/media','/mount']}, ans:2, exp:{es:'/media para montaje automático (GUI), /mnt para montaje manual.',en:'/media for auto-mount (GUI), /mnt for manual mount.'}},
  {cat:4, q:{es:'¿Qué es un hard link?',en:'What is a hard link?'}, opts:{es:['Apunta a una ruta','Apunta al inodo directamente','Puede cruzar sistemas de archivos','Es igual a un symlink'],en:['Points to a path','Points directly to the inode','Can cross filesystems','Same as symlink']}, ans:1, exp:{es:'Un hard link apunta al inodo del archivo. Si se borra el original, sigue funcionando.',en:'A hard link points directly to the inode. If original is deleted, it still works.'}},
  {cat:4, q:{es:'¿Qué hace "df -h"?',en:'What does "df -h" do?'}, opts:{es:['Muestra uso de disco en formato legible','Desfragmenta el disco','Muestra archivos duplicados','Borra archivos temporales'],en:['Shows disk usage in human-readable format','Defragments disk','Shows duplicate files','Deletes temporary files']}, ans:0, exp:{es:'df -h muestra el espacio usado/libre en sistemas de archivos montados (en GB/MB).',en:'df -h shows used/free space on mounted filesystems (in GB/MB).'}},
  {cat:4, q:{es:'¿Qué directorio contiene archivos temporales?',en:'Which directory contains temporary files?'}, opts:{es:['/tmp','/var/tmp','/run/tmp','Todas las anteriores'],en:['/tmp','/var/tmp','/run/tmp','All of the above']}, ans:3, exp:{es:'/tmp y /var/tmp son para archivos temporales. /run/tmp también en algunos sistemas.',en:'/tmp and /var/tmp are for temporary files. /run/tmp too on some systems.'}},
  {cat:4, q:{es:'¿Qué es un symlink?',en:'What is a symlink?'}, opts:{es:['Enlace duro','Enlace simbólico que apunta a una ruta','Un archivo comprimido','Un archivo de configuración'],en:['Hard link','Symbolic link that points to a path','A compressed file','A configuration file']}, ans:1, exp:{es:'Un symlink es un enlace simbólico que apunta a una ruta. Se crea con ln -s.',en:'A symlink is a symbolic link that points to a path. Created with ln -s.'}},
  {cat:4, q:{es:'¿Qué hace "du -sh *"?',en:'What does "du -sh *" do?'}, opts:{es:['Muestra el tamaño de cada archivo/directorio','Muestra espacio total del disco','Borra archivos grandes','Muestra inodos usados'],en:['Shows size of each file/directory','Shows total disk space','Deletes large files','Shows inodes used']}, ans:0, exp:{es:'du -sh * muestra el tamaño de cada archivo y directorio en el directorio actual.',en:'du -sh * shows the size of each file and directory in current directory.'}},
  {cat:4, q:{es:'¿Qué es el archivo /etc/fstab?',en:'What is the /etc/fstab file?'}, opts:{es:['Configuración de discos a montar al inicio','Configuración de red','Configuración de usuarios','Configuración de servicios'],en:['Disk mount configuration at boot','Network configuration','User configuration','Service configuration']}, ans:0, exp:{es:'/etc/fstab define los sistemas de archivos que se montan automáticamente al inicio.',en:'/etc/fstab defines filesystems that are automatically mounted at boot.'}},

  // ========== SCRIPTING (14 preguntas) ==========
  {cat:5, q:{es:'¿Cómo se lee entrada del usuario en bash?',en:'How to read user input in bash?'}, opts:{es:['input','$1','read','gets'],en:['input','$1','read','gets']}, ans:2, exp:{es:'read lee desde stdin y guarda en una variable. Ej: read nombre',en:'read reads from stdin and stores in a variable. Eg: read name'}},
  {cat:5, q:{es:'¿Qué contiene $? después de un comando?',en:'What is in $? after a command?'}, opts:{es:['Número de argumentos','Nombre del comando','Código de salida del comando anterior','PID'],en:['Argument count','Command name','Exit code of previous command','PID']}, ans:2, exp:{es:'$? contiene el código de salida del último comando (0 = éxito, ≠0 = error).',en:'$? contains the exit code of the last command (0 = success, ≠0 = error).'}},
  {cat:5, q:{es:'¿Cómo se asigna "Hello" a una variable?',en:'How to assign "Hello" to a variable?'}, opts:{es:['A="Hello"','A = "Hello"','echo "Hello" > A','$A="Hello"'],en:['A="Hello"','A = "Hello"','echo "Hello" > A','$A="Hello"']}, ans:0, exp:{es:'En bash: variable=valor sin espacios. A="Hello" es correcto.',en:'In bash: variable=value no spaces. A="Hello" is correct.'}},
  {cat:5, q:{es:'¿Cómo capturar la salida de pwd en una variable?',en:'How to capture pwd output in a variable?'}, opts:{es:['pwd $A','A=cwd','pwd | $A','A=$(pwd)'],en:['pwd $A','A=cwd','pwd | $A','A=$(pwd)']}, ans:3, exp:{es:'A=$(pwd) o A=`pwd` captura la salida de pwd en la variable A.',en:'A=$(pwd) or A=`pwd` captures pwd output in variable A.'}},
  {cat:5, q:{es:'Variable con el PID del shell actual',en:'Variable with current shell PID'}, opts:{es:['$!','$?','$$','$0'],en:['$!','$?','$$','$0']}, ans:2, exp:{es:'$$ contiene el PID (Process ID) del shell actual.',en:'$$ contains the PID (Process ID) of the current shell.'}},

  {cat:5, q:{es:'¿Qué hace "while true; do echo hola; done"?',en:'What does "while true; do echo hi; done" do?'}, opts:{es:['Error','Una vez','Bucle infinito','Depende'],en:['Error','Once','Infinite loop','Depends']}, ans:2, exp:{es:'while true crea un bucle infinito porque true siempre devuelve 0 (éxito).',en:'while true creates an infinite loop because true always returns 0 (success).'}},
  {cat:5, q:{es:'Variable con el nombre del script actual',en:'Variable with current script name'}, opts:{es:['$!','$#','$0','$?'],en:['$!','$#','$0','$?']}, ans:2, exp:{es:'$0 contiene el nombre del script o shell actual.',en:'$0 contains the current script or shell name.'}},

  {cat:5, q:{es:'Código de salida exitoso',en:'Successful exit code'}, opts:{es:['0','1','-1','255'],en:['0','1','-1','255']}, ans:0, exp:{es:'0 significa éxito. Cualquier otro número indica un error específico.',en:'0 means success. Any other number indicates a specific error.'}},
  {cat:5, q:{es:'Redirección 2> archivo significa:',en:'2> file redirection means:'}, opts:{es:['Redirige stdout','Redirige stderr','Redirige ambos','Redirige stdin'],en:['Redirects stdout','Redirects stderr','Redirects both','Redirects stdin']}, ans:1, exp:{es:'2> archivo redirige solo stderr (mensajes de error).',en:'2> file redirects only stderr (error messages).'}},
  {cat:5, q:{es:'Diferencia entre $@ y $*',en:'Difference between $@ and $*'}, opts:{es:['Son iguales','$@ = count, $* = args','$@ separa argumentos, $* los une','$@ solo scripts'],en:['They are the same','$@=count, $*=args','$@ keeps separate, $* joins all','$@ scripts only']}, ans:2, exp:{es:'$@ mantiene los argumentos separados respetando comillas, $* los fusiona en una cadena.',en:'$@ keeps arguments separate preserving quotes, $* joins them into one string.'}},
  {cat:5, q:{es:'¿Qué hace "grep -i"?',en:'What does "grep -i" do?'}, opts:{es:['Busca insensible a mayúsculas/minúsculas','Busca recursivamente','Muestra número de línea','Invierte la búsqueda'],en:['Search case-insensitive','Search recursively','Shows line number','Inverts search']}, ans:0, exp:{es:'grep -i busca ignorando mayúsculas/minúsculas (case-insensitive).',en:'grep -i searches ignoring case (case-insensitive).'}},
  {cat:5, q:{es:'¿Qué hace "chmod +x script.sh"?',en:'What does "chmod +x script.sh" do?'}, opts:{es:['Crea el script','Agrega permiso de ejecución','Borra el script','Compila el script'],en:['Creates the script','Adds execute permission','Deletes the script','Compiles the script']}, ans:1, exp:{es:'chmod +x agrega el bit de ejecución al script, permitiendo ejecutarlo con ./script.sh',en:'chmod +x adds execute permission, allowing execution with ./script.sh'}},

  // ========== SECURITY (12 preguntas) ==========
  {cat:6, q:{es:'SUID en un ejecutable permite:',en:'SUID on an executable allows:'}, opts:{es:['Ejecutar con permisos del grupo','Ejecutar con permisos del dueño','Evitar borrado','Comprimir archivo'],en:['Run with group permissions','Run with owner permissions','Prevent deletion','Compress file']}, ans:1, exp:{es:'SUID ejecuta el programa con los permisos del dueño del archivo (ej: /usr/bin/passwd).',en:'SUID runs the program with the owner\'s permissions (eg: /usr/bin/passwd).'}},
  {cat:6, q:{es:'chmod 4755 programa → ¿qué efecto tiene?',en:'chmod 4755 program → what effect?'}, opts:{es:['Ejecuta como grupo','Ejecuta como dueño (SUID)','Evita borrado (Sticky)','No tiene efecto'],en:['Runs as group','Runs as owner (SUID)','Prevents deletion (Sticky)','No effect']}, ans:1, exp:{es:'4755 = SUID (4) + rwxr-xr-x. El programa corre con permisos del dueño.',en:'4755 = SUID (4) + rwxr-xr-x. Runs with owner permissions.'}},
  {cat:6, q:{es:'Sticky bit en directorios permite:',en:'Sticky bit on directories allows:'}, opts:{es:['Cambiar grupo','Evitar que otros borren tus archivos','Evitar sobrescribir archivos','Cambiar owner'],en:['Change group','Prevent others from deleting your files','Prevent overwriting files','Change owner']}, ans:1, exp:{es:'Sticky bit: solo el dueño del archivo puede borrarlo (ej: /tmp tiene sticky bit).',en:'Sticky bit: only the file owner can delete it (eg: /tmp has sticky bit).'}},
  {cat:6, q:{es:'umask 027 → permisos de nuevo archivo',en:'umask 027 → new file permissions'}, opts:{es:['rwxr-x---','rw-r-----','rw-r--r--','rwxrwx---'],en:['rwxr-x---','rw-r-----','rw-r--r--','rwxrwx---']}, ans:1, exp:{es:'Base 666 - 027 = 640 → rw-r----- (dueño:rw, grupo:r, otros:ninguno).',en:'Base 666 - 027 = 640 → rw-r----- (owner:rw, group:r, others:none).'}},
  {cat:6, q:{es:'Comando para crear hard link',en:'Command to create hard link'}, opts:{es:['ln -s origen destino','ln origen destino','link -h origen destino','hardlink origen destino'],en:['ln -s orig dest','ln orig dest','link -h orig dest','hardlink orig dest']}, ans:1, exp:{es:'ln sin -s crea un hard link. Ej: ln archivo enlace',en:'ln without -s creates a hard link. Eg: ln file link'}},
  {cat:6, q:{es:'En /etc/group, el segundo campo contiene:',en:'In /etc/group, second field contains:'}, opts:{es:['Nombre del grupo','Contraseña del grupo (hash o x)','GID','Lista de usuarios'],en:['Group name','Group password (hash or x)','GID','User list']}, ans:1, exp:{es:'/etc/group: group_name:password:GID:user_list. El 2º campo es la contraseña.',en:'/etc/group: group_name:password:GID:user_list. 2nd field is password.'}},
  {cat:6, q:{es:'En -rwsr-xr-x, la "s" significa:',en:'In -rwsr-xr-x, "s" means:'}, opts:{es:['Socket','SUID activado','Symlink','Dispositivo'],en:['Socket','SUID set','Symlink','Device']}, ans:1, exp:{es:'s en la posición del dueño indica que SUID está activo. Ej: /usr/bin/passwd',en:'s in owner position indicates SUID is active. Eg: /usr/bin/passwd'}},
  {cat:6, q:{es:'Agregar usuario a grupo suplementario sin perder otros',en:'Add user to supplementary group without losing others'}, opts:{es:['usermod -G grupo user','usermod -aG grupo user','groupadd -u grupo user','useradd -G grupo user'],en:['usermod -G group user','usermod -aG group user','groupadd -u group user','useradd -G group user']}, ans:1, exp:{es:'usermod -aG = append + group. No sobrescribe, añade el grupo suplementario.',en:'usermod -aG = append + group. Does not overwrite, adds supplementary group.'}},
  {cat:6, q:{es:'¿Qué archivo contiene las contraseñas hasheadas?',en:'Which file contains hashed passwords?'}, opts:{es:['/etc/passwd','/etc/shadow','/etc/group','/var/passwords'],en:['/etc/passwd','/etc/shadow','/etc/group','/var/passwords']}, ans:1, exp:{es:'/etc/shadow contiene las contraseñas hasheadas, solo legible por root.',en:'/etc/shadow contains hashed passwords, only readable by root.'}},
  {cat:6, q:{es:'¿Qué hace "sudo"?',en:'What does "sudo" do?'}, opts:{es:['Cambia a root','Ejecuta un comando con privilegios de otro usuario','Crea un usuario','Verifica identidad'],en:['Switches to root','Executes a command with another user\'s privileges','Creates a user','Verifies identity']}, ans:1, exp:{es:'sudo ejecuta un comando con privilegios de otro usuario (generalmente root).',en:'sudo executes a command with another user\'s privileges (usually root).'}},
  {cat:6, q:{es:'¿Qué archivo define qué usuarios pueden usar sudo?',en:'Which file defines which users can use sudo?'}, opts:{es:['/etc/sudoers','/etc/sudo.conf','/etc/sudoers.d/','A y C son correctas'],en:['/etc/sudoers','/etc/sudo.conf','/etc/sudoers.d/','A and C are correct']}, ans:3, exp:{es:'/etc/sudoers y /etc/sudoers.d/ definen quién puede usar sudo. Edit con visudo.',en:'/etc/sudoers and /etc/sudoers.d/ define who can use sudo. Edit with visudo.'}},
  {cat:6, q:{es:'¿Qué hace "chown usuario:grupo archivo"?',en:'What does "chown user:group file" do?'}, opts:{es:['Cambia permisos','Cambia propietario y grupo','Cambia solo grupo','Cambia solo propietario'],en:['Changes permissions','Changes owner and group','Changes only group','Changes only owner']}, ans:1, exp:{es:'chown user:group cambia el propietario y el grupo del archivo simultáneamente.',en:'chown user:group changes both owner and group of the file.'}},

  // ========== OPEN SOURCE / LICENCIAS (8 preguntas) ==========
  {cat:8, q:{es:'¿Qué significa FOSS?',en:'What does FOSS mean?'}, opts:{es:['Fast Open Source','Free and Open Source Software','Full OS System','Federated Open'],en:['Fast Open Source','Free and Open Source Software','Full OS System','Federated Open']}, ans:1, exp:{es:'FOSS = Free/Libre Open Source Software. "Free" significa libertad, no precio.',en:'FOSS = Free/Libre Open Source Software. "Free" means freedom, not price.'}},
  {cat:8, q:{es:'¿Qué licencia usa el kernel Linux?',en:'What license does the Linux kernel use?'}, opts:{es:['MIT','Apache 2.0','GPLv2','BSD'],en:['MIT','Apache 2.0','GPLv2','BSD']}, ans:2, exp:{es:'El kernel Linux está bajo GPLv2 (GNU General Public License version 2).',en:'The Linux kernel is under GPLv2 (GNU General Public License version 2).'}},
  {cat:8, q:{es:'¿Qué es el copyleft?',en:'What is copyleft?'}, opts:{es:['Prohibe copiar software','Requiere que obras derivadas mantengan la misma licencia libre','Es software sin licencia','Es una alternativa al copyright'],en:['Prohibits copying software','Requires derivative works to keep the same free license','Is software without license','Is an alternative to copyright']}, ans:1, exp:{es:'Copyleft (como GPL) requiere que el software derivado mantenga la misma licencia libre.',en:'Copyleft (like GPL) requires derivative software to keep the same free license.'}},
  {cat:8, q:{es:'Diferencia entre GPLv2 y GPLv3',en:'Difference between GPLv2 and GPLv3'}, opts:{es:['GPLv3 es más permisiva','GPLv3 añade cláusulas de patentes y anti-Tivoization','GPLv2 es para servidores','No hay diferencia'],en:['GPLv3 is more permissive','GPLv3 adds patent clauses and anti-Tivoization','GPLv2 is for servers','No difference']}, ans:1, exp:{es:'GPLv3 añade cláusulas de patentes y anti-Tivoization (protección contra hardware que bloquea software libre).',en:'GPLv3 adds patent clauses and anti-Tivoization (protection against hardware that blocks free software).'}},
  {cat:8, q:{es:'¿Qué permite la licencia MIT?',en:'What does the MIT license allow?'}, opts:{es:['Solo uso personal','Uso comercial, modificación, distribución con atribución','Requiere compartir cambios','Prohíbe uso comercial'],en:['Personal use only','Commercial use, modification, distribution with attribution','Requires sharing changes','Prohibits commercial use']}, ans:1, exp:{es:'La licencia MIT es muy permisiva: permite uso comercial, modificación y distribución, solo requiere atribución.',en:'MIT license is very permissive: allows commercial use, modification, distribution, only requires attribution.'}},
  {cat:8, q:{es:'¿Qué es la licencia BSD?',en:'What is the BSD license?'}, opts:{es:['Una licencia restrictiva','Una licencia permisiva similar a MIT','Una licencia para hardware','Una licencia de Microsoft'],en:['A restrictive license','A permissive license similar to MIT','A license for hardware','A Microsoft license']}, ans:1, exp:{es:'La licencia BSD es permisiva, similar a MIT. Permite uso comercial y modificación con atribución.',en:'BSD license is permissive, similar to MIT. Allows commercial use and modification with attribution.'}},
  {cat:8, q:{es:'¿Qué licencia usa Apache 2.0?',en:'What does Apache 2.0 license do?'}, opts:{es:['Es copyleft fuerte','Es permisiva con cláusula de patentes','Es de dominio público','Es propietaria'],en:['Is strong copyleft','Is permissive with patent clause','Is public domain','Is proprietary']}, ans:1, exp:{es:'Apache 2.0 es una licencia permisiva que incluye una cláusula explícita sobre patentes.',en:'Apache 2.0 is a permissive license that includes an explicit patent clause.'}},
  {cat:8, q:{es:'¿Qué es el software de código abierto?',en:'What is open source software?'}, opts:{es:['Software que siempre es gratis','Software cuyo código fuente es accesible y puede ser modificado','Software sin licencia','Software propiedad de Microsoft'],en:['Software that is always free','Software whose source code is accessible and can be modified','Software without license','Software owned by Microsoft']}, ans:1, exp:{es:'El código abierto significa que el código fuente es accesible y se puede modificar/redistribuir.',en:'Open source means the source code is accessible and can be modified/redistributed.'}},

  // ========== ADMINISTRACIÓN DEL SISTEMA (8 preguntas) ==========
  {cat:9, q:{es:'¿Qué señal envía "kill -9"?',en:'What signal does "kill -9" send?'}, opts:{es:['SIGTERM (terminación elegante)','SIGKILL (terminación forzada)','SIGHUP (recargar)','SIGSTOP (pausar)'],en:['SIGTERM (graceful)','SIGKILL (forced)','SIGHUP (reload)','SIGSTOP (pause)']}, ans:1, exp:{es:'kill -9 envía SIGKILL, termina el proceso de forma forzada e inmediata (no puede ser capturado).',en:'kill -9 sends SIGKILL, forcefully terminates the process immediately (cannot be caught).'}},
  {cat:9, q:{es:'¿Qué hace "systemctl status servicio"?',en:'What does "systemctl status service" do?'}, opts:{es:['Inicia el servicio','Muestra el estado actual del servicio','Reinicia el servicio','Elimina el servicio'],en:['Starts the service','Shows current service status','Restarts the service','Removes the service']}, ans:1, exp:{es:'systemctl status muestra si el servicio está activo/inactivo y los últimos logs.',en:'systemctl status shows if the service is active/inactive and recent logs.'}},
  {cat:9, q:{es:'¿Qué hace "systemctl enable servicio"?',en:'What does "systemctl enable service" do?'}, opts:{es:['Inicia el servicio ahora','Configura el servicio para iniciar automáticamente al boot','Reinicia el servicio','Muestra el estado del servicio'],en:['Starts the service now','Configures service to start automatically at boot','Restarts the service','Shows service status']}, ans:1, exp:{es:'systemctl enable configura el servicio para que se inicie automáticamente al arrancar el sistema.',en:'systemctl enable configures the service to start automatically at system boot.'}},
  {cat:9, q:{es:'¿Qué muestra el comando "journalctl -b"?',en:'What does "journalctl -b" show?'}, opts:{es:['Logs del sistema actual','Logs del arranque actual','Logs de un servicio específico','Logs de errores del kernel'],en:['Current system logs','Current boot logs','Logs of a specific service','Kernel error logs']}, ans:1, exp:{es:'journalctl -b muestra los logs del arranque actual del sistema (boot logs).',en:'journalctl -b shows logs from the current system boot.'}},
  {cat:9, q:{es:'¿Qué hace "crontab -e"?',en:'What does "crontab -e" do?'}, opts:{es:['Ejecuta un trabajo cron','Edita el crontab del usuario actual','Lista los trabajos cron','Elimina el crontab'],en:['Runs a cron job','Edits the current user\'s crontab','Lists cron jobs','Deletes crontab']}, ans:1, exp:{es:'crontab -e abre el editor para modificar los trabajos programados del usuario.',en:'crontab -e opens the editor to modify the user\'s scheduled jobs.'}},
  {cat:9, q:{es:'¿Qué hace "rsync -avz origen destino"?',en:'What does "rsync -avz source dest" do?'}, opts:{es:['Copia archivos con compresión y modo archive','Mueve archivos','Borra archivos','Compara archivos'],en:['Copies files with compression and archive mode','Moves files','Deletes files','Compares files']}, ans:0, exp:{es:'rsync -avz: -a archive, -v verbose, -z compresión. Copia sincronizando archivos.',en:'rsync -avz: -a archive, -v verbose, -z compression. Copies synchronizing files.'}},
  {cat:9, q:{es:'¿Qué es un "inode"?',en:'What is an "inode"?'}, opts:{es:['Un archivo de configuración','Una estructura que almacena metadatos de un archivo (permisos, tamaño, fechas)','Un tipo de enlace','Un directorio especial'],en:['A configuration file','A structure storing file metadata (permissions, size, dates)','A type of link','A special directory']}, ans:1, exp:{es:'Un inode es una estructura de datos que almacena metadatos del archivo (permisos, dueño, tamaño, fechas, bloques).',en:'An inode is a data structure storing file metadata (permissions, owner, size, dates, blocks).'}},
  {cat:9, q:{es:'¿Qué hace "ulimit -n"?',en:'What does "ulimit -n" do?'}, opts:{es:['Muestra el límite de archivos abiertos','Muestra el límite de procesos','Muestra el límite de memoria','Muestra el límite de CPU'],en:['Shows open file limit','Shows process limit','Shows memory limit','Shows CPU limit']}, ans:0, exp:{es:'ulimit -n muestra o establece el número máximo de archivos que un proceso puede abrir.',en:'ulimit -n shows or sets the maximum number of open files a process can have.'}}
];

const CAT_NAMES = ['Hardware', 'Command Line', 'Kernel', 'Package Mgmt', 'Filesystem', 'Scripting', 'Security', 'Networking', 'Licencias/OSS', 'Administración'];
const TEXTS = {
  es: { all:'Examen completo', cat:'Por categoría', wrong:'Solo falladas', start:'▶ Iniciar (100 preguntas)', next:'Siguiente →', end:'⏹ Terminar', total:'Total', correct:'Correctas', wrong2:'Falladas', score:'Score', q:'Pregunta', of:'de', correct_msg:'✓ ¡Correcto!', wrong_msg:'✗ Incorrecto', explanation:'📖 Explicación:', pick_cat:'Elige categoría:', restart:'🔁 Repetir examen', menu:'🏠 Menú principal', no_wrong:'Sin falladas aún. ¡Haz un examen primero!', results_title:'📊 Resultados del examen', passed:'🎉 ¡Aprobado!', failed:'📚 Sigue practicando' },
  en: { all:'Full exam', cat:'By category', wrong:'Wrong only', start:'▶ Start (100 questions)', next:'Next →', end:'⏹ End', total:'Total', correct:'Correct', wrong2:'Wrong', score:'Score', q:'Question', of:'of', correct_msg:'✓ Correct!', wrong_msg:'✗ Incorrect', explanation:'📖 Explanation:', pick_cat:'Choose category:', restart:'🔁 Retry exam', menu:'🏠 Main menu', no_wrong:'No wrong answers yet!', results_title:'📊 Exam results', passed:'🎉 Passed!', failed:'📚 Keep studying' }
};

// ==============================================================
// LÓGICA DEL SIMULADOR (se mantiene igual)
// ==============================================================
let lang = 'es', mode = 'all', selectedCat = -1, queue = [], currentIdx = 0, answered = false, correctCount = 0, wrongCount = 0, wrongList = [], catStats = {};

function updateUITexts() { let t=TEXTS[lang]; document.getElementById('lbl-all').innerText=t.all; document.getElementById('lbl-cat').innerText=t.cat; document.getElementById('lbl-wrong').innerText=t.wrong; document.getElementById('start-btn').innerHTML=t.start; document.getElementById('lbl-total').innerText=t.total; document.getElementById('lbl-correct').innerText=t.correct; document.getElementById('lbl-wrong2').innerText=t.wrong2; document.getElementById('lbl-score').innerText=t.score; document.getElementById('btn-end').innerText=t.end; }
function setLang(l){ lang=l; document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active', i===(l==='es'?0:1))); updateUITexts(); if(mode==='cat') renderCatPicker(); if(currentIdx<queue.length&&!document.getElementById('exam-screen').classList.contains('hidden')) renderQuestion(); }
function setMode(m){ mode=m; ['all','cat','wrong'].forEach(id=>document.getElementById(`mode-${id}`).classList.toggle('active', mode===id)); document.getElementById('cat-picker').classList.toggle('hidden', mode!=='cat'); if(mode==='cat') renderCatPicker(); }
function renderCatPicker(){ let p=document.getElementById('cat-picker'); p.innerHTML=`<p style="font-size:0.8rem;">${TEXTS[lang].pick_cat}</p>`; CAT_NAMES.forEach((c,i)=>{ let b=document.createElement('button'); b.innerText=c; b.className='cat-opt-btn'; b.onclick=()=>{ selectedCat=i; document.querySelectorAll('.cat-opt-btn').forEach(btn=>btn.classList.remove('correct')); b.classList.add('correct'); }; p.appendChild(b); }); }
function buildQueue(){ let pool = mode==='all' ? [...QUESTIONS] : mode==='cat' ? QUESTIONS.filter(q=>q.cat===selectedCat) : QUESTIONS.filter((_,idx)=>wrongList.includes(idx)); for(let i=pool.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; } return pool; }
function startExam(){ if(mode==='wrong'&&wrongList.length===0){ alert(TEXTS[lang].no_wrong); return; } if(mode==='cat'&&selectedCat===-1){ alert(TEXTS[lang].pick_cat); return; } queue=buildQueue(); currentIdx=0; correctCount=0; wrongCount=0; catStats={}; answered=false; document.getElementById('mode-screen').classList.add('hidden'); document.getElementById('results-screen').classList.add('hidden'); document.getElementById('exam-screen').classList.remove('hidden'); updateStats(); renderQuestion(); }
function renderQuestion(){ if(currentIdx>=queue.length){ showResults(); return; } let q=queue[currentIdx]; answered=false; document.getElementById('cat-label').innerHTML=CAT_NAMES[q.cat]; document.getElementById('q-num').innerHTML=`${TEXTS[lang].q} ${currentIdx+1} ${TEXTS[lang].of} ${queue.length}`; document.getElementById('q-text').innerHTML=q.q[lang]; let optsDiv=document.getElementById('options-container'); optsDiv.innerHTML=''; q.opts[lang].forEach((opt,i)=>{ let btn=document.createElement('button'); btn.className='option-btn'; btn.innerHTML=`<span class="opt-letter">${String.fromCharCode(65+i)}.</span> ${opt}`; btn.onclick=()=>checkAnswer(i,btn,q); optsDiv.appendChild(btn); }); document.getElementById('feedback').classList.add('hidden'); document.getElementById('btn-next').classList.add('hidden'); document.getElementById('progress').style.width=`${(currentIdx/queue.length)*100}%`; }
function checkAnswer(selectedIdx, btn, q){ if(answered) return; answered=true; let isCorrect=(selectedIdx===q.ans); let allBtns=document.querySelectorAll('.option-btn'); allBtns.forEach((b,i)=>{ b.disabled=true; if(i===q.ans) b.classList.add('correct'); if(i===selectedIdx&&!isCorrect) b.classList.add('wrong'); }); let fb=document.getElementById('feedback'); fb.className=`feedback-panel ${isCorrect?'correct':'wrong'}`; fb.innerHTML=`<div class="feedback-title">${isCorrect?TEXTS[lang].correct_msg:TEXTS[lang].wrong_msg}</div><div><strong>${TEXTS[lang].explanation}</strong> ${q.exp[lang]}</div>`; fb.classList.remove('hidden'); let globalIdx=QUESTIONS.findIndex(p=>p===q); if(isCorrect){ correctCount++; if(wrongList.includes(globalIdx)) wrongList=wrongList.filter(i=>i!==globalIdx); } else { wrongCount++; if(!wrongList.includes(globalIdx)) wrongList.push(globalIdx); } if(!catStats[q.cat]) catStats[q.cat]={c:0,w:0}; isCorrect?catStats[q.cat].c++:catStats[q.cat].w++; updateStats(); let nextBtn=document.getElementById('btn-next'); nextBtn.classList.remove('hidden'); nextBtn.innerText=currentIdx===queue.length-1?(lang==='es'?'Ver resultados →':'Show results →'):TEXTS[lang].next; }
function updateStats(){ let total=correctCount+wrongCount; document.getElementById('s-total').innerText=total; document.getElementById('s-correct').innerText=correctCount; document.getElementById('s-wrong').innerText=wrongCount; document.getElementById('s-score').innerText=total?Math.round((correctCount/total)*100)+'%':'0%'; }
function nextQuestion(){ currentIdx++; renderQuestion(); }
function endExam(){ showResults(); }
function showResults(){ document.getElementById('exam-screen').classList.add('hidden'); let pct=queue.length?Math.round((correctCount/queue.length)*100):0; let passed=pct>=80; let catHtml=''; Object.entries(catStats).forEach(([c,st])=>{ let tot=st.c+st.w; let per=tot?Math.round((st.c/tot)*100):0; catHtml+=`<div class="cat-row"><span>${CAT_NAMES[c]}</span><span style="color:${per>=80?'#16a34a':'#ef4444'}">${st.c}/${tot} (${per}%)</span></div>`; }); document.getElementById('results-screen').innerHTML=`<div class="results-card"><h2>${TEXTS[lang].results_title}</h2><div class="score-ring"><div class="score-inner"><span style="font-size:2rem;font-weight:700;">${pct}%</span><span style="font-size:0.75rem;">${passed?TEXTS[lang].passed:TEXTS[lang].failed}</span></div></div><p>${correctCount} ${TEXTS[lang].correct} / ${queue.length} — ${TEXTS[lang].wrong2}: ${wrongCount}</p>${catHtml?'<div class="cat-results-list">'+catHtml+'</div>':''}<div style="display:flex;gap:0.7rem;justify-content:center;flex-wrap:wrap;"><button class="btn btn-primary" onclick="startExam()">${TEXTS[lang].restart}</button><button class="btn" onclick="goMenu()">${TEXTS[lang].menu}</button></div></div>`; document.getElementById('results-screen').classList.remove('hidden'); }
function goMenu(){ document.getElementById('results-screen').classList.add('hidden'); document.getElementById('mode-screen').classList.remove('hidden'); document.getElementById('exam-screen').classList.add('hidden'); currentIdx=0; correctCount=0; wrongCount=0; answered=false; }

window.setLang=setLang; window.setMode=setMode; window.startExam=startExam; window.nextQuestion=nextQuestion; window.endExam=endExam; window.goMenu=goMenu;
updateUITexts();
</script>
